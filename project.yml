name: LiquefCheck
options:
  bundleIdPrefix: com.tokyonasu
  deploymentTarget:
    iOS: "16.0"

packages:
  GoogleMobileAds:
    url: https://github.com/googleads/swift-package-manager-google-mobile-ads.git
    exactVersion: 11.13.0

settings:
  base:
    SWIFT_VERSION: 5.9
    TARGETED_DEVICE_FAMILY: "1,2"
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    PRODUCT_BUNDLE_IDENTIFIER: com.tokyonasu.liquefcheck
    DEVELOPMENT_TEAM: 83VGKGSQUH
    CODE_SIGN_STYLE: Automatic

targets:
  LiquefCheck:
    type: application
    platform: iOS
    sources: [LiquefCheck]
    dependencies:
      - package: GoogleMobileAds
    settings:
      base:
        INFOPLIST_FILE: LiquefCheck/Info.plist
        PRODUCT_NAME: LiquefCheck
    info:
      path: LiquefCheck/Info.plist
      properties:
        CFBundleName: 液状化チェック
        CFBundleDisplayName: 液状化チェック
        CFBundleShortVersionString: "1.0"
        CFBundleVersion: "1"
        LSRequiresIPhoneOS: true
        UILaunchScreen:
          UIColorName: ""
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: true
        NSUserTrackingUsageDescription: "広告配信のためにデータを使用します。"
        NSLocationWhenInUseUsageDescription: "現在地の地盤情報を取得するために位置情報を使用します。"
        GADApplicationIdentifier: ca-app-pub-9404799280370656~LIQUEFCHK1
        SKAdNetworkItems:
          - SKAdNetworkIdentifier: cstr6suwn9.skadnetwork
          - SKAdNetworkIdentifier: 4fzdc2evr5.skadnetwork
          - SKAdNetworkIdentifier: 2fnua5tdw4.skadnetwork
          - SKAdNetworkIdentifier: ydx93a7ass.skadnetwork
          - SKAdNetworkIdentifier: 5a6flpkh64.skadnetwork
          - SKAdNetworkIdentifier: p78axxw29g.skadnetwork
          - SKAdNetworkIdentifier: v72qych5uu.skadnetwork
