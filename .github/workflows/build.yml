name: Build and Upload to App Store

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
    - uses: actions/checkout@v6

    - name: Select Xcode
      run: |
        XCODE_APP=$(ls /Applications/ | grep -E "^Xcode_2[6-9]|^Xcode_[3-9][0-9]" | sort -V | tail -1)
        if [ -n "$XCODE_APP" ]; then
          sudo xcode-select -s "/Applications/$XCODE_APP"
        else
          XCODE_APP=$(ls /Applications/ | grep "^Xcode_" | sort -V | tail -1)
          sudo xcode-select -s "/Applications/$XCODE_APP"
        fi
        xcodebuild -version

    - name: Install XcodeGen
      run: brew install xcodegen

    - name: Set build number
      run: |
        BUILD_NUM=$(( ${{ github.run_number }} + 10 ))
        echo "BUILD_NUM=$BUILD_NUM" >> $GITHUB_ENV
        sed -i "" "s/CURRENT_PROJECT_VERSION: [0-9]*/CURRENT_PROJECT_VERSION: $BUILD_NUM/" project.yml

    - name: Generate Xcode project
      run: xcodegen generate

    - name: Patch Info.plist build number
      run: |
        sed -i "" "s|<string>\$(CURRENT_PROJECT_VERSION)</string>|<string>$BUILD_NUM</string>|" LiquefCheck/Info.plist
        sed -i "" "/<key>CFBundleVersion<\/key>/{n;s|<string>[^<]*</string>|<string>$BUILD_NUM</string>|;}" LiquefCheck/Info.plist

    - name: Import Distribution Certificate
      env:
        CERT_BASE64: ${{ secrets.DIST_CERT_BASE64 }}
        CERT_PASSWORD: ${{ secrets.DIST_CERT_PASSWORD }}
        KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
      run: |
        security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
        security default-keychain -s build.keychain
        security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
        security set-keychain-settings -t 3600 -u build.keychain
        echo "$CERT_BASE64" | base64 -D > cert.p12
        security import cert.p12 -k build.keychain -P "$CERT_PASSWORD" -T /usr/bin/codesign
        security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" build.keychain
        rm cert.p12

    - name: Set up ASC API Key
      env:
        ASC_API_KEY_CONTENT: ${{ secrets.ASC_API_KEY_CONTENT }}
      run: |
        mkdir -p ~/.appstoreconnect/private_keys
        echo "$ASC_API_KEY_CONTENT" | base64 -D > ~/.appstoreconnect/private_keys/AuthKey_WDXGY9WX55.p8
        cp ~/.appstoreconnect/private_keys/AuthKey_WDXGY9WX55.p8 /tmp/asc_key.p8

    - name: Install PyJWT
      run: pip3 install --break-system-packages PyJWT requests

    - name: Take Screenshots
      run: |
        DEVICE="iPhone 16 Pro Max"
        UDID=$(xcrun simctl list devices available | grep "$DEVICE" | head -1 | grep -oE '[A-F0-9-]{36}')
        if [ -z "$UDID" ]; then
          DEVICE="iPhone 15 Pro Max"
          UDID=$(xcrun simctl list devices available | grep "$DEVICE" | head -1 | grep -oE '[A-F0-9-]{36}')
        fi
        echo "Using $DEVICE ($UDID)"
        xcrun simctl boot "$UDID" || true
        xcodebuild build \
          -scheme LiquefCheck \
          -destination "platform=iOS Simulator,id=$UDID" \
          -derivedDataPath build/sim \
          CODE_SIGN_IDENTITY=- \
          CODE_SIGNING_ALLOWED=NO
        APP_PATH=$(find build/sim -name "*.app" -path "*/Debug-iphonesimulator/*" | head -1)
        xcrun simctl install "$UDID" "$APP_PATH"
        xcrun simctl launch "$UDID" com.tokyonasu.liquefcheck
        sleep 5
        mkdir -p screenshots
        xcrun simctl io "$UDID" screenshot screenshots/iphone_67.png
        xcrun simctl shutdown "$UDID" || true

    - name: Upload Screenshots to ASC
      run: python3 scripts/upload_screenshots.py screenshots

    - name: Build Archive
      run: |
        xcodebuild archive \
          -scheme LiquefCheck \
          -configuration Release \
          -destination "generic/platform=iOS" \
          -archivePath build/LiquefCheck.xcarchive \
          CODE_SIGN_STYLE=Automatic \
          DEVELOPMENT_TEAM=83VGKGSQUH \
          -allowProvisioningUpdates \
          -authenticationKeyPath ~/.appstoreconnect/private_keys/AuthKey_WDXGY9WX55.p8 \
          -authenticationKeyID WDXGY9WX55 \
          -authenticationKeyIssuerID 2be0734f-943a-4d61-9dc9-5d9045c46fec

    - name: Export IPA
      run: |
        xcodebuild -exportArchive \
          -archivePath build/LiquefCheck.xcarchive \
          -exportPath build/export \
          -exportOptionsPlist export_options.plist \
          -allowProvisioningUpdates \
          -authenticationKeyPath ~/.appstoreconnect/private_keys/AuthKey_WDXGY9WX55.p8 \
          -authenticationKeyID WDXGY9WX55 \
          -authenticationKeyIssuerID 2be0734f-943a-4d61-9dc9-5d9045c46fec

    - name: Submit for Review
      run: python3 scripts/submit.py ${{ env.BUILD_NUM }}
